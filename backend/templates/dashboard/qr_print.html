{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать QR</title>

    <style>
        @page {
            size: 55mm 40mm;
            margin: 0;
        }

        html,
        body {
            width: 55mm;
            min-height: 40mm;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .item {
            border: 1px solid #ddd;
            box-sizing: border-box;
            width: 55mm;
            height: 40mm;
            padding: 2mm 3mm;
            text-align: center;
            page-break-after: always;
            break-after: page;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item img {
            width: 21mm;
            height: 21mm;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .qr-code {
            font-weight: bold;
            font-size: 9pt;
            line-height: 1;
            min-height: 4mm;
            margin-bottom: 1mm;
        }

        .label-bottom {
            width: 100%;
            margin-top: 1mm;
            font-size: 6pt;
            line-height: 1.1;
            overflow: hidden;
        }

        .name {
            max-height: 4.6mm;
            overflow: hidden;
        }

        .inv {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .print-actions {
            margin: 0 0 20px;
        }

        @media screen {
            body {
                padding: 12px;
            }

            .item {
                margin-bottom: 8px;
            }
        }

        @media print {
            .no-print {
                display: none;
            }

            .item:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body>

<div class="no-print print-actions">
    <button onclick="window.print()">Печать</button>
</div>

{% for item in items %}
    <div class="item">
        <div class="qr-code">
            {{ item.tag.code }}
        </div>

        {% if item.tag.qr_image %}
            <img src="{{ item.tag.qr_image.url }}" alt="{{ item.tag.code }}">
        {% endif %}

        <div class="label-bottom">
            <div class="name">{{ item.equipment.name }}</div>
            <div class="inv">Инв.: {{ item.equipment.inventory_number|default:"-" }}</div>
            <div>Сер.: {{ item.equipment.serial_number|default:"-" }}</div>
        </div>
    </div>
{% endfor %}

</body>
</html>
