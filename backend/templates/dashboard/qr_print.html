{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать QR</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 55mm);
            gap: 4mm;
        }

        .item {
            border: 1px solid #ddd;
            box-sizing: border-box;
            width: 55mm;
            height: 40mm;
            padding: 2mm 3mm;
            text-align: center;
            page-break-inside: avoid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .item img {
            width: 22mm;
            height: 22mm;
            object-fit: contain;
        }

        .qr-code {
            font-weight: bold;
            font-size: 9pt;
            line-height: 1;
            margin-bottom: 1mm;
        }

        .name {
            font-size: 6pt;
            line-height: 1.1;
            margin-top: 1mm;
            max-height: 7mm;
            overflow: hidden;
        }

        .inv {
            font-weight: bold;
            font-size: 6pt;
            line-height: 1.1;
        }

        .print-actions {
            margin-bottom: 20px;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="no-print print-actions">
    <button onclick="window.print()">Печать</button>
</div>

<div class="grid">
    {% for item in items %}
        <div class="item">
            <div class="qr-code">
                {{ item.tag.code }}
            </div>

            {% if item.tag.qr_image %}
                <img src="{{ item.tag.qr_image.url }}">
            {% endif %}

            <div class="inv">
                {{ item.equipment.inventory_number }}
            </div>

            <div class="name">
                {{ item.equipment.name }}
            </div>
        </div>
    {% endfor %}
</div>

</body>
</html>
